name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: Apply Terraform (infra changes) ──────────────────────────────────
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Init
        run: terraform init
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    us-east-1

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    us-east-1

  # ── Job 2: Deploy frontend to Vercel ────────────────────────────────────────
  # NOTE: If you use Vercel's GitHub integration (auto-deploy on push),
  # you can delete this job — Vercel will deploy automatically.
  # Keep this job only if you prefer explicit CLI control over deployments.
  vercel:
    name: Vercel Deploy
    runs-on: ubuntu-latest
    needs: terraform
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          VITE_API_BASE_URL:         ${{ secrets.VITE_API_BASE_URL }}
          VITE_WS_URL:               ${{ secrets.VITE_WS_URL }}
          VITE_USE_MOCK:             "false"
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID:    ${{ secrets.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_DOMAIN:       ${{ secrets.VITE_COGNITO_DOMAIN }}

      - name: Deploy to Vercel
        run: npx vercel --prod --token "${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
